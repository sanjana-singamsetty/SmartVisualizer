<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartVisualizer</title>
    <style>
      .md-body p { margin: 0 0 8px; }
      .md-body p:last-child { margin-bottom: 0; }
      .md-body ul, .md-body ol { margin: 0 0 8px; padding-left: 20px; }
      .md-body li { margin-bottom: 2px; }
      .md-body code { background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
      .md-body pre { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; overflow-x: auto; margin: 0 0 8px; }
      .md-body pre code { background: none; padding: 0; }
      .md-body strong { font-weight: 600; }
      .md-body h1, .md-body h2, .md-body h3 { margin: 8px 0 4px; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
